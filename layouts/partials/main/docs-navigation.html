{{ with .Params.related_topics -}}
	<aside class="docs-navigation docs-related-topics" aria-label="{{ $.Params.related_topics_heading | default "Related topics" }}">
		<h2 class="mb-3">{{ $.Params.related_topics_heading | default "Related topics" }}:</h2>
		{{ range . -}}
			{{ $href := .url | default .href -}}
			{{ $label := .title | default .name -}}
			{{ if and $href $label -}}
				<p class="mb-2">
					<a href="{{ if strings.HasPrefix $href "http" }}{{ $href }}{{ else }}{{ $href | relLangURL }}{{ end }}">{{ $label }}</a>
				</p>
			{{ end -}}
		{{ end -}}
	</aside>
{{ end -}}
